name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14       # Apple Silicon (arm64)
            name: macOS arm64
          - os: macos-13       # Intel (amd64)
            name: macOS amd64
          - os: ubuntu-latest  # Linux (amd64)
            name: Linux amd64

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Unit tests
        run: go test -short -v -timeout 60s

      - name: Integration tests (download + all APIs)
        run: go test -v -timeout 300s
